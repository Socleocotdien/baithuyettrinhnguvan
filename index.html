<!DOCTYPE html>
<html>
<head>
  <title>BÀI THUYẾT TRÌNH NGỮ VĂN - TỔ 4</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: "Segoe UI", sans-serif;

      background: url("dinhdoclap.jpg") no-repeat center;
      background-size: cover;
    }

    .overlay {
      position: absolute;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.6);
    }

    .box {
      position: relative;
      z-index: 1;
      padding: 40px;
      width: 320px;
      text-align: center;

      background: rgba(255,255,255,0.1);
      border-radius: 20px;
      backdrop-filter: blur(10px);
      box-shadow: 0 0 20px rgba(255,215,0,0.3);
      color: white;
    }

    h2 {
      margin-bottom: 20px;
    }

    input {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: none;
      outline: none;
      margin-bottom: 15px;
    }

    button {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: none;
      background: linear-gradient(135deg, gold, orange);
      color: black;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      transform: scale(1.05);
    }

    #msg {
      margin-top: 10px;
    }
  </style>
</head>

<body>

<div class="overlay"></div>

<div class="box">
  <h2>🔒 BÀI THUYẾT TRÌNH NGỮ VĂN - TỔ 4</h2>

  <input type="password" id="pass" placeholder="Nhập công thức để bước vào 'Lâu đài'"
    onkeypress="if(event.key==='Enter') check()">

  <button onclick="check()">Vào</button>

  <p id="msg"></p>
</div>
<video id="intro" src="videogioithieu.mp4"
  style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; object-fit:cover;"
  controls muted playsinline>
</video>

  <button id="enterBtn"
  style="display:none; position:fixed; bottom:40px; left:50%; transform:translateX(-50%);
  padding:12px 25px; border:none; border-radius:10px; background:gold; font-weight:bold; cursor:pointer;">
  Vậy qua video, sự kiện nào được nhắc tới? Sự kiện ấy gắn liền với địa danh nào?
</button>
  <button id="skipBtn"
  style="display:none; position:fixed; top:20px; right:20px;
  padding:8px 15px; border:none; border-radius:8px;
  background:rgba(0,0,0,0.6); color:white; cursor:pointer;">
  Bỏ qua ⏭️
</button>

<script>
  function check() {
    var password = document.getElementById("pass").value;

    if(password === "to49a6") {

      // Ẩn form
      document.querySelector(".box").style.display = "none";

     // Hiện video
var video = document.getElementById("intro");
video.style.display = "block";

video.play().then(() => {
  video.muted = false;
});

// hiện nút skip
document.getElementById("skipBtn").style.display = "block";

      // Khi video kết thúc → hiện nút
      video.onended = function() {
        document.getElementById("enterBtn").style.display = "block";
      };

    } else {
      document.getElementById("msg").innerText =
        "muhahahaha sai mật khẩu rồi muhahahaha 1 là mày là người đột nhập 2 là một chú gà ngây thơ vào xem thử 3 là thằng Minh quên mặt khẩu. Ôi bạn thật là chicken😈";    }
  }

   // nút vào VR360
  document.getElementById("enterBtn").onclick = function() {
    window.location.href = "https://vr360.com.vn/projects/dinhdoclap/";
  };

  // nút skip
  document.getElementById("skipBtn").onclick = function() {
    window.location.href = "https://vr360.com.vn/projects/dinhdoclap/";
  };
</script>
