<!DOCTYPE html>
<html>
<head>
  <title>BÀI THUYẾT TRÌNH NGỮ VĂN - TỔ 4</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: "Segoe UI", sans-serif;

      background: url("dinhdoclap.jpg") no-repeat center;
      background-size: cover;
    }

    .overlay {
      position: absolute;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.6);
    }

    .box {
      position: relative;
      z-index: 1;
      padding: 40px;
      width: 320px;
      text-align: center;

      background: rgba(255,255,255,0.1);
      border-radius: 20px;
      backdrop-filter: blur(10px);
      box-shadow: 0 0 20px rgba(255,215,0,0.3);
      color: white;
    }

    h2 {
      margin-bottom: 20px;
    }

    input {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: none;
      outline: none;
      margin-bottom: 15px;
    }

    button {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: none;
      background: linear-gradient(135deg, gold, orange);
      color: black;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      transform: scale(1.05);
    }

    #msg {
      margin-top: 10px;
    }
  </style>
</head>

<body>

<div class="overlay"></div>

<div class="box">
  <h2>🔒 BÀI THUYẾT TRÌNH NGỮ VĂN - TỔ 4</h2>

  <input type="password" id="pass" placeholder="Nhập mật khẩu"
    onkeypress="if(event.key==='Enter') check()">

  <button onclick="check()">Vào</button>

  <p id="msg"></p>
</div>
<video id="intro" src="videogioithieu.mp4"
  style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; object-fit:cover;"
  muted playsinline>
</video>

<script>
  function check() {
    var password = document.getElementById("pass").value;

    if(password === "to49a6") {

      // Ẩn form nhập mật khẩu
      document.querySelector(".box").style.display = "none";

      // Hiện video
      var video = document.getElementById("intro");
      video.style.display = "block";
      video.play();

      // Khi video kết thúc → chuyển trang
      video.onended = function() {
        window.location.href = "https://vr360.com.vn/projects/dinhdoclap/";
      };

    } else {
      document.getElementById("msg").innerText =
        "muhahahaha sai mật khẩu rồi muhahahaha 1 là mày là người đột nhập 2 là một chú gà ngây thơ vào xem thử 3 là thằng Minh quên mặt khẩu. Ôi bạn thật là chicken😈";
    }
  }
</script>

</body>
</html>
